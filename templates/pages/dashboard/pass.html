<!DOCTYPE html>
<html lang="ru" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в панель — {{ APP_NAME }}</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50:  '#eef2ff',
                            600: '#4f46e5',
                            700: '#4338ca',
                        }
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Font Awesome 6.5.1 -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
          crossorigin="anonymous" referrerpolicy="no-referrer">

    <style>
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 font-sans antialiased h-full min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-sm">

        <!-- Card -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-8 shadow-2xl shadow-black/40">

            <!-- Logo area -->
            <div class="flex flex-col items-center mb-8">
                <div class="w-16 h-16 rounded-2xl bg-indigo-600 flex items-center justify-center mb-4 shadow-lg shadow-indigo-600/30">
                    <i class="fa-solid fa-lock text-white text-2xl"></i>
                </div>
                <h1 class="text-xl font-bold text-white tracking-tight">{{ APP_NAME }}</h1>
            </div>

            <!-- Welcome message -->
            <div class="text-center mb-6">
                <p class="text-base font-semibold text-white">
                    Добро пожаловать, {{ request.user.name }}
                </p>
                <p class="text-sm text-slate-400 mt-1">
                    Введите пароль для входа в панель
                </p>
            </div>

            <!-- Password form -->
            <form method="post" class="space-y-4">
                {% csrf_token %}
                <div>
                    <label for="pass-input" class="text-sm font-medium text-slate-300 mb-1.5 block">
                        Пароль
                    </label>
                    <input id="pass-input"
                           type="password"
                           name="pass"
                           placeholder="••••••••"
                           required
                           autofocus
                           class="w-full bg-slate-800 border border-slate-600 rounded-xl px-4 py-2.5
                                  text-white placeholder-slate-500
                                  focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500
                                  transition-colors">
                </div>

                <button type="submit"
                        class="w-full bg-indigo-600 hover:bg-indigo-500 active:bg-indigo-700
                               text-white font-semibold py-2.5 rounded-xl transition-colors
                               flex items-center justify-center gap-2">
                    <i class="fa-solid fa-arrow-right-to-bracket"></i>
                    Войти
                </button>
            </form>

            <!-- Back link -->
            <div class="mt-6 text-center">
                <a href="{% url 'home' %}"
                   class="text-sm text-slate-500 hover:text-slate-300 transition-colors inline-flex items-center gap-1.5">
                    <i class="fa-solid fa-arrow-left text-xs"></i>
                    Вернуться на главную
                </a>
            </div>

        </div>

        <!-- Footer -->
        <p class="text-center text-xs text-slate-600 mt-6">
            &copy; {{ APP_NAME }}. Панель администратора.
        </p>
    </div>

</body>
</html>
