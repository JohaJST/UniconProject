<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        {% load static %}
        <title>{% block title %}{% endblock %} — {{ APP_NAME }}</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            type="image/x-icon"
            href="{% static 'favicon.ico' %}"
            rel="shortcut icon"
        />
        <style>
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            :root {
                --nav-bg: #0f172a;
                --nav-border: rgba(255, 255, 255, 0.07);
                --nav-text: #94a3b8;
                --nav-text-act: #f1f5f9;
                --accent: #4e75ad;
                --accent-light: #6b93cc;
                --radius-sm: 8px;
                --ease: cubic-bezier(0.4, 0, 0.2, 1);
                --dur: 0.2s;
            }

            body {
                font-family: "Inter", sans-serif;
                background: #0f172a;
                color: #f1f5f9;
                min-height: 100vh;
            }

            /* ── Navbar ── */
            .navbar {
                position: sticky;
                top: 0;
                z-index: 100;
                height: 60px;
                background: var(--nav-bg);
                border-bottom: 1px solid var(--nav-border);
                display: flex;
                align-items: center;
                gap: 1rem;
                padding: 0 1.5rem;
                backdrop-filter: blur(12px);
                -webkit-backdrop-filter: blur(12px);
            }

            .nav-brand {
                font-size: 1rem;
                font-weight: 700;
                color: var(--accent-light);
                text-decoration: none;
                letter-spacing: -0.01em;
                white-space: nowrap;
                flex-shrink: 0;
                transition: color var(--dur) var(--ease);
            }
            .nav-brand:hover {
                color: #fff;
            }

            .nav-divider {
                width: 1px;
                height: 20px;
                background: var(--nav-border);
                flex-shrink: 0;
            }

            .nav-links {
                display: flex;
                align-items: center;
                gap: 0.25rem;
                flex: 1;
            }

            .nav-link {
                display: inline-flex;
                align-items: center;
                gap: 0.375rem;
                padding: 0.375rem 0.75rem;
                font-size: 0.875rem;
                font-weight: 500;
                color: var(--nav-text);
                text-decoration: none;
                border-radius: var(--radius-sm);
                transition:
                    color var(--dur) var(--ease),
                    background var(--dur) var(--ease);
                white-space: nowrap;
            }
            .nav-link:hover {
                color: var(--nav-text-act);
                background: rgba(255, 255, 255, 0.06);
            }
            .nav-link.admin {
                color: var(--accent-light);
            }
            .nav-link.admin:hover {
                color: #fff;
                background: rgba(78, 117, 173, 0.15);
            }

            .nav-right {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                margin-left: auto;
                flex-shrink: 0;
            }

            .nav-user {
                display: flex;
                align-items: center;
                gap: 0.5rem;
                font-size: 0.875rem;
                font-weight: 500;
                color: var(--nav-text-act);
                text-decoration: none;
                padding: 0.375rem 0.75rem;
                border-radius: var(--radius-sm);
                transition: background var(--dur) var(--ease);
            }
            .nav-user:hover {
                background: rgba(255, 255, 255, 0.06);
            }

            .nav-avatar {
                width: 28px;
                height: 28px;
                border-radius: 50%;
                background: linear-gradient(
                    135deg,
                    var(--accent),
                    var(--accent-light)
                );
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.6875rem;
                font-weight: 700;
                color: #fff;
                flex-shrink: 0;
                text-transform: uppercase;
            }

            .nav-logout {
                display: inline-flex;
                align-items: center;
                gap: 0.375rem;
                padding: 0.375rem 0.875rem;
                font-size: 0.8125rem;
                font-weight: 500;
                color: var(--nav-text);
                text-decoration: none;
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: var(--radius-sm);
                transition:
                    color var(--dur) var(--ease),
                    border-color var(--dur) var(--ease),
                    background var(--dur) var(--ease);
            }
            .nav-logout:hover {
                color: #fca5a5;
                border-color: rgba(239, 68, 68, 0.35);
                background: rgba(239, 68, 68, 0.08);
            }

            /* ── Mobile ── */
            @media (max-width: 640px) {
                .nav-brand-text {
                    display: none;
                }
                .nav-user-name {
                    display: none;
                }
                .nav-divider {
                    display: none;
                }
                .navbar {
                    padding: 0 1rem;
                }
            }
        </style>
        {% block header %}{% endblock %}
    </head>
    <body>
        <nav class="navbar">
            <a href="{% url 'home' %}" class="nav-brand">
                <span class="nav-brand-text">{{ APP_NAME }}</span>
            </a>

            <span class="nav-divider"></span>

            <div class="nav-links">
                <a href="{% url 'home' %}" class="nav-link">Тесты</a>
                {% if user.is_admin %}
                <a href="{% url 'dashboard' %}" class="nav-link admin">
                    Панель управления
                </a>
                {% endif %}
            </div>

            <div class="nav-right">
                <a href="{% url 'user_profile' %}" class="nav-user">
                    <span class="nav-avatar"
                        >{{ user.name|default:"?"|slice:":1" }}</span
                    >
                    <span class="nav-user-name">{{ user.full_name }}</span>
                </a>
                <a href="{% url 'logout' %}" class="nav-logout">Выйти</a>
            </div>
        </nav>

        {% block body %}{% endblock %}
    </body>
</html>
